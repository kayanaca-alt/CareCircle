<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" width="100%" height="100%">
  <!--
    Kinovia Logo
    ============
    Two versions in one file:
      1. Icon + Wordmark (top)  — for general branding, social, hero sections
      2. Wordmark Only (bottom) — for headers, nav bars, compact spaces

    Brand palette:
      - Green:  #2E8B57 (primary), lighter #4CB876 for gradient
      - Amber:  #C88A5C (primary), lighter #E0B890 for gradient
      - Cream:  #FFF9F2 (heart accent)

    Font: Georgia / Times New Roman / serif (system fallbacks — no external deps)

    Symbol: Two overlapping circles (Venn-diagram style) representing
            family connection and mutual care, with a small heart
            in the intersection — warmth, trust, and love.
  -->

  <!-- ============ DEFS ============ -->
  <defs>
    <!-- Soft green gradient for left circle -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#4CB876; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E8B57; stop-opacity:1" />
    </linearGradient>

    <!-- Warm amber gradient for right circle -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#E0B890; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C88A5C; stop-opacity:1" />
    </linearGradient>

    <!-- Subtle drop shadow for soft, approachable depth -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000018" />
    </filter>
  </defs>

  <!--
    ================================================================
    VERSION 1 — ICON + WORDMARK
    ================================================================
    Icon: two interlocking circles with a heart at their intersection.
    Wordmark: "Kinovia" in serif, to the right of the icon.
  -->
  <g id="version-icon-wordmark">
    <!-- Icon group with soft shadow -->
    <g filter="url(#softShadow)">
      <!-- Left circle — represents the parent/care recipient (green = life, growth) -->
      <circle cx="68" cy="110" r="50" fill="url(#greenGrad)" opacity="0.88" />

      <!-- Right circle — represents the adult child/family (amber = warmth, earth) -->
      <circle cx="112" cy="110" r="50" fill="url(#amberGrad)" opacity="0.88" />
    </g>

    <!--
      Heart in the overlap — the love at the center of family care.
      Centered at (90, 110), scaled slightly for proportion.
      Path: classic heart shape (centered at origin, then translated).
    -->
    <path
      d="M 0,12 C -22,-10 -10,-24 0,-14 C 10,-24 22,-10 0,12 Z"
      fill="#FFF9F2"
      transform="translate(90, 112) scale(0.95)"
    />

    <!-- Wordmark: "Kinovia" -->
    <text
      x="195"
      y="126"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="60"
      font-weight="bold"
      fill="#2E8B57"
      letter-spacing="1"
    >
      Kinovia
    </text>
  </g>

  <!-- Subtle divider between the two versions -->
  <line x1="60" y1="235" x2="640" y2="235" stroke="#E8D5C4" stroke-width="1.5" stroke-dasharray="6,4" />

  <!--
    ================================================================
    VERSION 2 — WORDMARK ONLY
    ================================================================
    Standalone "Kinovia" wordmark, centred — for headers, nav bars,
    and compact spaces where the icon isn't needed.
  -->
  <g id="version-wordmark-only">
    <text
      x="350"
      y="365"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="72"
      font-weight="bold"
      fill="#2E8B57"
      letter-spacing="2"
      text-anchor="middle"
    >
      Kinovia
    </text>
  </g>
</svg>
